# This configuration file is used by the pyInkPictureFrame project to specify
# options for the EPD display, image URL, alarm interval, shutdown behavior,
# and logging configuration (including Loki support).

epd: "waveshare_epd.epd7in3f"
url: "http://x.x.x.x"
alarmMinutes: 2
noShutdown: false
# MQTT configuration for Home Assistant integration
mqtt:
  host: "localhost"   # MQTT broker address
  port: 1883           # MQTT broker port
  topic: "homeassistant/sensor/pisugar_battery/state"  # MQTT topic for battery level
  username: ""         # Optional: MQTT username
  password: ""         # Optional: MQTT password
# Apprise notification configuration
apprise:
  url: "http://localhost:8000"       # Apprise container base URL
  battery_alert_threshold: 20        # Notify when battery drops below this %

# Logging backend configuration
logging:
  backend: "console"    # Options: console | seq | syslog | loki (future)
  level: "INFO"
  seq:
    url: "http://localhost:5341"
  syslog:
    host: "localhost"
    port: 514
  loki:
    url: "http://localhost:3100/loki/api/v1/push"
    labels:
      job: "pyInkPictureFrame"

updater:
  enabled: true        # Set to false to disable auto-update entirely
  force_revert: false  # Set to true to revert to latest release on next USB-power cycle
